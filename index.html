<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>One-Shot Workflow Generator</title>
    <script src="https://unpkg.com/cytoscape@3.28.1/dist/cytoscape.min.js"></script>
    <script src="https://unpkg.com/cytoscape-dagre@2.5.0/cytoscape-dagre.js"></script>
    <script src="https://unpkg.com/dagre@0.8.5/dist/dagre.min.js"></script>
    <style>
        body {
            font-family: 'Courier New', monospace;
            background-color: #000;
            color: #fff;
            margin: 0;
            padding: 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
        }
        .container {
            max-width: 800px;
            width: 100%;
            background-color: #fff;
            color: #000;
            border: 8px solid #ff0000;
            box-shadow: 8px 8px 0px #000;
            padding: 20px;
            margin-bottom: 20px;
        }
        h1 {
            margin-top: 0;
            font-size: 24px;
        }
        input[type="text"] {
            width: 100%;
            padding: 10px;
            border: 4px solid #00ff00;
            box-shadow: 4px 4px 0px #000;
            font-size: 16px;
            margin-bottom: 10px;
            box-sizing: border-box;
        }
        button {
            background-color: #ffff00;
            color: #000;
            border: 4px solid #0000ff;
            box-shadow: 4px 4px 0px #000;
            padding: 10px 20px;
            font-size: 16px;
            cursor: pointer;
            margin-bottom: 20px;
            font-weight: bold;
        }
        button:hover {
            box-shadow: 6px 6px 0px #000;
        }
        button:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }
        #flowchart {
            width: 100%;
            height: 400px;
            border: 4px solid #ff00ff;
            box-shadow: 4px 4px 0px #000;
            margin-bottom: 20px;
            background-color: #f9f9f9;
        }
        #json-display {
            background-color: #f0f0f0;
            border: 4px solid #00ffff;
            box-shadow: 4px 4px 0px #000;
            padding: 10px;
            overflow-x: auto;
            white-space: pre-wrap;
            font-family: monospace;
            font-size: 12px;
        }
        .footer {
            margin-top: 20px;
            text-align: center;
            font-size: 12px;
            opacity: 0.7;
        }
        @media (max-width: 600px) {
            .container {
                padding: 10px;
            }
            #flowchart {
                height: 300px;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>⚡ One-Shot Workflow Generator</h1>
        <p>Describe a workflow in plain English and watch it come to life!</p>
        <input type="text" id="workflow-input" placeholder="e.g., automate my daily newsletter curation">
        <button id="generate-btn">Generate Workflow</button>
        <div id="flowchart"></div>
        <div id="json-display">Your workflow JSON will appear here...</div>
        <div class="footer">Built by Sam AI | Powered by Grok</div>
    </div>
    <script>
        const input = document.getElementById('workflow-input');
        const button = document.getElementById('generate-btn');
        const flowchartDiv = document.getElementById('flowchart');
        const jsonDisplay = document.getElementById('json-display');
        let cy;

        // Register dagre layout
        cytoscape.use(cytoscapeDagre);

        button.addEventListener('click', async () => {
            const description = input.value.trim();
            if (!description) {
                alert('Please enter a workflow description!');
                return;
            }

            button.disabled = true;
            button.textContent = 'Generating...';
            jsonDisplay.textContent = 'Processing...';

            try {
                // Call Vercel serverless function (proxies Grok API securely)
                const response = await fetch('/api/generate', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify({ description })
                });

                if (!response.ok) {
                    const errorData = await response.json();
                    throw new Error(errorData.error || `API call failed: ${response.status}`);
                }

                const data = await response.json();
                let workflowContent = data.choices[0].message.content.trim();
                
                // Strip markdown code blocks if present
                if (workflowContent.startsWith('```json')) {
                    workflowContent = workflowContent.split('```json\n')[1].split('```')[0];
                } else if (workflowContent.startsWith('```')) {
                    workflowContent = workflowContent.split('```\n')[1].split('```')[0];
                }
                
                const workflowJson = JSON.parse(workflowContent);
                jsonDisplay.textContent = JSON.stringify(workflowJson, null, 2);

                // Visualize with Cytoscape
                if (cy) cy.destroy();
                cy = cytoscape({
                    container: flowchartDiv,
                    elements: [
                        ...workflowJson.nodes.map(node => ({
                            data: { id: node.id, label: node.label, type: node.type }
                        })),
                        ...workflowJson.edges.map(edge => ({
                            data: { source: edge.from, target: edge.to }
                        }))
                    ],
                    style: [
                        {
                            selector: 'node',
                            style: {
                                'background-color': '#ffff00',
                                'label': 'data(label)',
                                'text-valign': 'center',
                                'text-halign': 'center',
                                'text-wrap': 'wrap',
                                'text-max-width': '80px',
                                'border-width': 4,
                                'border-color': '#000',
                                'width': 120,
                                'height': 60,
                                'font-size': 10,
                                'font-weight': 'bold'
                            }
                        },
                        {
                            selector: 'edge',
                            style: {
                                'width': 4,
                                'line-color': '#ff0000',
                                'target-arrow-color': '#ff0000',
                                'target-arrow-shape': 'triangle',
                                'curve-style': 'bezier'
                            }
                        }
                    ],
                    layout: {
                        name: 'dagre',
                        rankDir: 'TB',
                        nodeSep: 50,
                        rankSep: 80
                    }
                });

                button.textContent = 'Generate Another';
            } catch (error) {
                console.error('Full error:', error);
                jsonDisplay.textContent = 'Error: ' + error.message + '\n\nPlease try again or check console for details.';
                button.textContent = 'Try Again';
            } finally {
                button.disabled = false;
            }
        });
    </script>
</body>
</html>
